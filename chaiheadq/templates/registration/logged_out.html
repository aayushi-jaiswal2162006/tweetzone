{% extends "layout.html" %}

{% block title %}Logged Out{% endblock %}

{% block content %}
<div class="container mt-5 text-center">
  <div class="shadow p-5 rounded" style="background-color: #1e1e2f; color: #ffffff; max-width: 400px; margin: auto;">
    <h2 class="mb-3 text-danger"><i class="fa-solid fa-circle-check"></i> Logged Out</h2>
    <p>You have been successfully logged out.</p>
    <a href="{% url 'login' %}" class="btn btn-primary mt-3"><i class="fa-solid fa-right-to-bracket"></i> Login again</a>
  </div>
</div>
{% endblock %}
