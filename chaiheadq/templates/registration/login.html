{% extends "layout.html" %}
{% block title %}Login - TwitZone{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 85vh; background: #f0f2f5;">
  <div class="card p-5 shadow-sm" style="width: 100%; max-width: 400px; border-radius: 12px; background-color: #fff;">
    <h3 class="text-center mb-4 text-primary fw-bold"><i class="fa-solid fa-right-to-bracket me-2"></i> Welcome Back</h3>

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-3">
        <label for="id_username" class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control form-control-lg" id="id_username" required placeholder="Enter your username">
      </div>
      <div class="mb-3">
        <label for="id_password" class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control form-control-lg" id="id_password" required placeholder="Enter your password">
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Login</button>
    </form>

    <p class="mt-4 text-center text-muted small">
      Don’t have an account?
      <a href="{% url 'register' %}" class="text-decoration-none fw-semibold text-primary">Register here</a>
    </p>
  </div>
</div>
{% endblock %}
